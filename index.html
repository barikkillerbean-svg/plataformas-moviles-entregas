<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabajo Bootstrap</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h1 class="text-center">Control de Versiones con Git</h1>

    <p class="fs-5">
        <strong>Git</strong> es una herramienta para guardar cambios en el código y trabajar en equipo.
    </p>

    <!-- LISTA -->
    <ul class="list-group mb-4 shadow">
        <li class="list-group-item">git init</li>
        <li class="list-group-item">git add</li>
        <li class="list-group-item">git commit</li>
    </ul>

    <!-- TABLA -->
    <table class="table table-striped table-bordered">
        <tr>
            <th>Comando</th>
            <th>Función</th>
        </tr>
        <tr>
            <td>git status</td>
            <td>Ver estado</td>
        </tr>
        <tr>
            <td>git push</td>
            <td>Subir cambios</td>
        </tr>
    </table>

    <!-- FORMULARIO -->
    <form class="mt-4">
        <input type="text" class="form-control mb-2" placeholder="Nombre">
        <button class="btn btn-success">Enviar</button>
    </form>

    <!-- COMPONENTE 1: ALERT -->
    <div class="alert alert-info mt-3">
        Git es muy importante en programación.
    </div>

    <!-- COMPONENTE 2: COLLAPSE -->
    <button class="btn btn-primary mt-3" data-bs-toggle="collapse" data-bs-target="#info">
        Ver más
    </button>

    <div id="info" class="collapse mt-2">
        <div class="card card-body">
            Permite controlar versiones del código.
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
